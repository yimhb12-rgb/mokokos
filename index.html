<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOKOKO STREET POP-UP in SEONGSU — 운영 현황판</title>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--surface:#fff;--surface-2:#f9f9f8;
  --border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.16);
  --text-primary:#1a1a18;--text-secondary:#5a5a56;--text-muted:#999990;
  --radius:8px;
  --green:#1D9E75;--green-bg:rgba(225,245,238,.7);--green-text:#085041;
  --amber:#BA7517;--amber-bg:rgba(250,238,218,.7);--amber-text:#854F0B;
  --red:#A32D2D;--red-bg:rgba(252,235,235,.7);--red-text:#791F1F;
  --darkred:#791F1F;--darkred-bg:rgba(252,235,235,.85);--darkred-text:#501313;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--surface:#1c1c1a;--surface-2:#222220;
  --border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.18);
  --text-primary:#f0f0ec;--text-secondary:#a8a8a0;--text-muted:#666660;
}}
body{background:var(--bg);color:var(--text-primary);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;min-height:100vh;-webkit-text-size-adjust:100%}
.wrap{max-width:920px;margin:0 auto;padding:20px 16px 80px}
.header{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:14px;border-bottom:.5px solid var(--border);margin-bottom:16px;gap:12px}
.eyebrow{font-size:11px;color:var(--text-muted);letter-spacing:.08em;margin-bottom:3px}
.main-title{font-size:17px;font-weight:600;user-select:none;-webkit-user-select:none}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.clock-wrap{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px;font-variant-numeric:tabular-nums}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.sync-txt{font-size:11px;margin-right:4px}
.title-edit{display:none;flex-direction:column;gap:8px;margin-top:10px;padding:12px;background:var(--surface-2);border-radius:var(--radius);border:.5px solid var(--border)}
.edit-row{display:flex;align-items:center;gap:8px}
.edit-row label{font-size:11px;color:var(--text-muted);width:48px;flex-shrink:0}
.edit-row input[type=text]{flex:1;padding:8px 10px;font-size:16px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text-primary);font-family:inherit}
.color-picker-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:4px;padding:12px;background:var(--surface-2);border-radius:var(--radius);border:.5px solid var(--border)}
.tab-color-item{display:flex;flex-direction:column;gap:6px;flex:1;min-width:120px}
.tab-color-label{font-size:10px;color:var(--text-muted);font-weight:600}
.tab-color-controls{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.color-input-wrap{width:32px;height:32px;border-radius:50%;overflow:hidden;border:.5px solid var(--border-strong);cursor:pointer;flex-shrink:0;position:relative}
.color-input-wrap input[type=color]{position:absolute;width:200%;height:200%;top:-50%;left:-50%;border:none;cursor:pointer;padding:0}
.preset-swatches{display:flex;gap:4px;flex-wrap:wrap}
.swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0}
.swatch:hover{transform:scale(1.2)}
.swatch.active{border-color:var(--text-primary)}
.swatch-clear{width:20px;height:20px;border-radius:50%;cursor:pointer;border:1.5px solid var(--border-strong);background:var(--surface);font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);flex-shrink:0}
.btn{padding:8px 16px;font-size:13px;border-radius:var(--radius);border:.5px solid var(--border-strong);background:var(--surface);color:var(--text-primary);cursor:pointer;font-family:inherit;white-space:nowrap;touch-action:manipulation;min-height:36px}
.btn.active-mode{background:var(--text-primary);color:var(--bg);border-color:var(--text-primary)}
.btn-danger{border-color:var(--red);color:var(--red-text)}
.btn-add{border-color:var(--green);color:var(--green-text)}
.tabs{display:flex;gap:2px;background:var(--surface-2);border-radius:var(--radius);padding:3px;margin-bottom:16px;border:.5px solid var(--border)}
.tab{flex:1;padding:10px 0;font-size:13px;text-align:center;border-radius:6px;cursor:pointer;border:.5px solid transparent;background:transparent;color:var(--text-secondary);font-family:inherit;transition:background .15s,color .15s;touch-action:manipulation;min-height:40px}
.tab.active{background:var(--surface);color:var(--text-primary);font-weight:600}
.sub-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.sub-tab{padding:7px 16px;font-size:12px;border-radius:20px;cursor:pointer;border:.5px solid var(--border);background:transparent;color:var(--text-secondary);font-family:inherit;touch-action:manipulation}
.sub-tab.active{background:var(--text-primary);color:var(--bg);border-color:var(--text-primary)}
.sub-tab.danger-tab{color:var(--red-text)}
.sub-tab.danger-tab.active{background:var(--red-text);color:#fff;border-color:var(--red-text)}
.section-bg{border-radius:12px;padding:14px;transition:background .3s,border-color .3s;border:.5px solid transparent}
.inv-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sum-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:10px 8px;text-align:center}
.sum-label{font-size:10px;color:var(--text-muted);margin-bottom:3px}
.sum-val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.inv-wrap{background:var(--surface);border:.5px solid var(--border);border-radius:12px;overflow:hidden}
.inv-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:320px}
th{text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);padding:10px 12px;border-bottom:.5px solid var(--border);background:var(--surface-2);white-space:nowrap}
th.th-img{text-align:center;width:160px}
td{padding:10px 12px;border-bottom:.5px solid var(--border);vertical-align:middle}
td.td-img{text-align:center;vertical-align:middle;width:160px;padding:10px}
tr:last-child td{border-bottom:none}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.inv-name{font-weight:600;font-size:13px;line-height:1.4;word-break:keep-all}
.inv-input{padding:6px 8px;font-size:16px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-family:inherit;width:80px}
.inv-input-wide{width:120px}
.muted{color:var(--text-muted);font-size:12px;font-variant-numeric:tabular-nums}
.stock-bar-wrap{width:68px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.stock-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.inv-thumb{max-width:144px;max-height:144px;width:auto;height:auto;border-radius:6px;border:.5px solid var(--border);background:var(--surface-2);display:inline-block;object-fit:contain;cursor:zoom-in;transition:opacity .15s;vertical-align:middle}
.inv-thumb:hover{opacity:.85}
.inv-thumb-empty{width:144px;height:144px;border-radius:6px;border:.5px dashed var(--border-strong);background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:24px;cursor:pointer;margin:0 auto}
.inv-thumb-wrap{position:relative;width:fit-content;margin:0 auto;display:flex;align-items:center;justify-content:center}
.inv-thumb-wrap:hover .inv-thumb-del{display:flex}
.inv-thumb-del{display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);border-radius:6px;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#fff}
.hidden{display:none}
.add-form{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:18px}
.add-form h3{font-size:14px;font-weight:600;margin-bottom:6px}
.sub-desc{font-size:12px;color:var(--text-muted);margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field label{font-size:11px;color:var(--text-muted);font-weight:600}
.form-field input{padding:10px;font-size:16px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-family:inherit}
.form-field input:focus{outline:none;border-color:var(--green)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.del-list-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius);border:.5px solid var(--border);margin-bottom:6px;cursor:pointer}
.del-list-item.selected{background:var(--red-bg);border-color:var(--red)}
.del-list-item input[type=checkbox]{width:18px;height:18px;cursor:pointer;flex-shrink:0;accent-color:var(--red-text)}
.del-item-name{font-size:13px;font-weight:600;flex:1}
.sort-list{display:flex;flex-direction:column;gap:6px}
.sort-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius)}
.sort-name{font-size:13px;font-weight:600;flex:1}
.sort-btns{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.sort-btn{width:28px;height:24px;border:none;border-radius:4px;background:var(--surface-2);color:var(--text-secondary);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.sort-btn:disabled{opacity:.25;cursor:default}
.queue-card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.queue-fill{position:absolute;left:0;right:0;bottom:0;opacity:.45;transition:height .4s}
.queue-inner{position:relative}
.queue-hidden-notice{text-align:center;padding:20px;font-size:13px;color:var(--text-muted);background:var(--surface);border-radius:12px;border:.5px dashed var(--border)}
.notice-bar{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;line-height:1.6;word-break:keep-all;border:.5px solid var(--border-strong);background:#fff;color:var(--text-primary)}
.toggle-wrap{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)}
.toggle{position:relative;width:44px;height:24px;cursor:pointer;display:inline-flex;align-items:center}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border-strong);border-radius:24px;transition:.2s}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .toggle-track{background:var(--green)}
.toggle.on .toggle-thumb{left:23px}
.img-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:999;cursor:pointer}
.img-modal-overlay.show{display:flex}
.img-modal-inner{position:relative;max-width:90vw;max-height:90vh}
.img-modal-inner img{max-width:90vw;max-height:85vh;width:auto;height:auto;border-radius:10px;display:block;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.img-modal-close{position:absolute;top:-14px;right:-14px;width:30px;height:30px;border-radius:50%;background:#fff;color:#111;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-modal-name{text-align:center;margin-top:12px;font-size:13px;color:#fff;opacity:.85}
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:999;display:none}
.pw-overlay.show{display:flex}
.pw-modal{background:var(--surface);border-radius:14px;border:.5px solid var(--border);padding:28px 28px 24px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.pw-modal h3{font-size:15px;font-weight:600;margin-bottom:4px}
.pw-modal p{font-size:12px;color:var(--text-muted);margin-bottom:18px}
.pw-input-wrap{position:relative;margin-bottom:10px}
.pw-input-wrap input{width:100%;padding:9px 36px 9px 12px;font-size:14px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-family:inherit;letter-spacing:.08em}
.pw-input-wrap input:focus{outline:none;border-color:var(--green)}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:0}
.pw-error{font-size:12px;color:var(--red-text);margin-bottom:12px;min-height:16px}
.pw-actions{display:flex;gap:8px;justify-content:flex-end}
#fabAdmin{position:fixed;bottom:24px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--surface);border:.5px solid var(--border-strong);color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.12);transition:background .15s,color .15s,transform .15s;z-index:90;touch-action:manipulation}
#fabAdmin:active{transform:scale(.93)}
#fabAdmin.fab-on{background:var(--text-primary);color:var(--bg);border-color:var(--text-primary)}
#fabAdmin svg{display:block}
@media(max-width:480px){
  .wrap{padding:14px 12px 80px}
  .header{flex-direction:column;gap:10px}
  .header-right{width:100%;justify-content:space-between}
  .form-grid{grid-template-columns:1fr}
  .tab{font-size:12px;padding:9px 0}
  .inv-summary .sum-val{font-size:15px}
}
</style>
</head>
<body>

<div class="pw-overlay" id="pwOverlay">
  <div class="pw-modal">
    <h3>관리자 확인</h3>
    <p>비밀번호를 입력해주세요.</p>
    <div class="pw-input-wrap">
      <input type="password" id="pwInput" autocomplete="off" placeholder="비밀번호">
      <button class="pw-toggle" id="pwToggle">👁</button>
    </div>
    <div class="pw-error" id="pwError"></div>
    <div class="pw-actions">
      <button class="btn" id="pwCancel">취소</button>
      <button class="btn btn-add" id="pwConfirm">확인</button>
    </div>
  </div>
</div>

<div class="img-modal-overlay" id="imgModal">
  <div class="img-modal-inner">
    <button class="img-modal-close" id="imgModalClose">✕</button>
    <img id="imgModalImg" src="" alt="">
    <div class="img-modal-name" id="imgModalName"></div>
  </div>
</div>

<button id="fabAdmin" aria-label="관리자 모드">
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</button>

<div class="wrap">
  <div class="header">
    <div style="flex:1;min-width:0">
      <div class="eyebrow" id="eyebrow-text">MOKOKO STREET POP-UP in SEONGSU</div>
      <div class="main-title" id="title-text">운영 현황판</div>
      <div class="title-edit" id="title-edit">
        <div class="edit-row"><label>부제목</label><input type="text" id="input-eyebrow" value="MOKOKO STREET POP-UP in SEONGSU"></div>
        <div class="edit-row"><label>타이틀</label><input type="text" id="input-title" value="운영 현황판"></div>
        <div class="color-picker-row">
          <div class="tab-color-item">
            <div class="tab-color-label">📦 재고 현황 탭 컬러</div>
            <div class="tab-color-controls">
              <div class="color-input-wrap"><input type="color" id="cp-inv" value="#ffffff"></div>
              <div class="preset-swatches" id="sw-inv"></div>
            </div>
          </div>
          <div class="tab-color-item">
            <div class="tab-color-label">🙋 현장 등록 대기열 탭 컬러</div>
            <div class="tab-color-controls">
              <div class="color-input-wrap"><input type="color" id="cp-queue" value="#ffffff"></div>
              <div class="preset-swatches" id="sw-queue"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="clock-wrap">
        <span class="pulse" id="pulse"></span>
        <span class="sync-txt" id="syncTxt">연결 중…</span>
        <span id="clock">--:--:--</span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-inv" onclick="switchTab('inv')">📦 재고 현황</button>
    <button class="tab" id="tab-queue" onclick="switchTab('queue')">🙋 현장 등록 대기열</button>
  </div>

  <div id="sec-inv">
    <div class="section-bg" id="bg-inv">
      <div class="sub-tabs">
        <button class="sub-tab active" id="stab-list" onclick="switchSub('list')">재고 현황</button>
        <button class="sub-tab hidden" id="stab-add" onclick="switchSub('add')">+ 항목 추가</button>
        <button class="sub-tab hidden" id="stab-sort" onclick="switchSub('sort')">순서 변경</button>
        <button class="sub-tab danger-tab hidden" id="stab-del" onclick="switchSub('del')">항목 삭제</button>
      </div>
      <div id="ss-list">
        <div class="inv-summary" id="invSummary"></div>
        <div class="inv-wrap"><div class="inv-scroll">
          <table><thead id="invHead"></thead><tbody id="invBody"></tbody></table>
        </div></div>
      </div>
      <div id="ss-add" class="hidden">
        <div class="add-form">
          <h3>항목 추가</h3>
          <p class="sub-desc">추가 후 재고 현황에서 수량을 바로 수정할 수 있어요.</p>
          <div class="form-grid">
            <div class="form-field"><label>상품명 *</label><input type="text" id="new-name" placeholder="예: 모코코 키링"></div>
            <div class="form-field"><label>가격</label><input type="text" id="new-price" placeholder="예: 15,000원"></div>
            <div class="form-field"><label>재고 수량 *</label><input type="number" id="new-total" min="1" placeholder="예: 500"></div>
            <div class="form-field"><label>잔여 수량 *</label><input type="number" id="new-remain" min="0" placeholder="예: 320"></div>
          </div>
          <div class="form-actions">
            <button class="btn" onclick="switchSub('list')">취소</button>
            <button class="btn btn-add" id="btnAdd">+ 추가</button>
          </div>
        </div>
      </div>
      <div id="ss-sort" class="hidden">
        <div class="add-form">
          <h3>순서 변경</h3>
          <p class="sub-desc">▲ ▼ 버튼으로 순서를 변경하세요.</p>
          <div class="sort-list" id="sortList"></div>
          <div class="form-actions" style="margin-top:14px">
            <button class="btn" onclick="switchSub('list')">완료</button>
          </div>
        </div>
      </div>
      <div id="ss-del" class="hidden">
        <div class="add-form">
          <h3>항목 삭제</h3>
          <p class="sub-desc">삭제할 항목을 선택한 뒤 삭제 버튼을 눌러주세요.</p>
          <div id="delList"></div>
          <div class="form-actions" style="margin-top:14px">
            <button class="btn" onclick="switchSub('list')">취소</button>
            <button class="btn btn-danger" id="btnDel">선택 삭제</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="sec-queue" class="hidden">
    <div class="section-bg" id="bg-queue">
      <div id="noticeBar" class="notice-bar hidden"></div>
      <div id="queueContent"></div>
    </div>
  </div>
</div>

<script>
// ── Firebase
var db = firebase.initializeApp({
  databaseURL: 'https://mokokos-default-rtdb.asia-southeast1.firebasedatabase.app'
}).database();

var DEF_INV = [
  {id:'f1',name:'여름방학 피규어 (3종)',price:'18,000원',total:6000,remain:4200,img:''},
  {id:'f2',name:'모니터 랜덤 피규어 (4종)',price:'7,000원',total:10000,remain:7800,img:''},
  {id:'k1',name:'모코코 인형 키링',price:'16,000원',total:1600,remain:980,img:''},
  {id:'k2',name:'손목 쿠션',price:'15,000원',total:1600,remain:640,img:''},
  {id:'k3',name:'모코코 가방키링',price:'10,000원',total:1600,remain:1230,img:''},
  {id:'k4',name:'모코코 얼굴 인형 랜덤키링 (4종)',price:'15,000원',total:1600,remain:180,img:''},
  {id:'k5',name:'모코코 미니 파우치',price:'12,000원',total:2000,remain:1540,img:''},
  {id:'d1',name:'텀블러',price:'32,000원',total:1000,remain:720,img:''},
  {id:'d2',name:'장패드',price:'25,000원',total:1000,remain:390,img:''},
  {id:'d3',name:'캐릭터 마그넷 오프너',price:'15,000원',total:3000,remain:2100,img:''},
  {id:'d4',name:'카드 스티커 (2종)',price:'5,000원',total:1000,remain:68,img:''},
  {id:'d5',name:'물방울 스티커',price:'5,000원',total:1000,remain:520,img:''},
  {id:'d6',name:'모코코 선풍기',price:'34,000원',total:1000,remain:290,img:''},
  {id:'d7',name:'LED 4구 키캡키링',price:'—',total:1000,remain:850,img:''}
];
var inventory = JSON.parse(JSON.stringify(DEF_INV));
var queue = {status:'여유', visible:true, notice:''};
var tabColors = {inv:'', queue:''};
var adminMode = false;
var lockUntil = 0;
var saveTimer = null;

function uid(){ return 'u_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 5); }
function isLocked(){ return Date.now() < lockUntil; }
function lock(ms){ lockUntil = Date.now() + (ms||2000); }

function setSync(text, ok){
  var el=document.getElementById('syncTxt');
  var p=document.getElementById('pulse');
  if(el){ el.textContent=text; el.style.color=ok?'var(--green-text)':'var(--amber-text)'; }
  if(p) p.style.background=ok?'var(--green)':'var(--amber)';
}

function tick(){
  var el=document.getElementById('clock'); if(!el){setTimeout(tick,100);return;}
  var n=new Date();
  el.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
}
tick(); setInterval(tick,1000);

function switchTab(t){
  ['inv','queue'].forEach(function(id){
    document.getElementById('sec-'+id).classList.toggle('hidden',id!==t);
    document.getElementById('tab-'+id).classList.toggle('active',id===t);
  });
  if(t==='queue') renderQueue();
}

function switchSub(s){
  ['list','add','sort','del'].forEach(function(id){
    document.getElementById('ss-'+id).classList.toggle('hidden',id!==s);
    document.getElementById('stab-'+id).classList.toggle('active',id===s);
  });
  if(s==='add') document.getElementById('new-name').focus();
  if(s==='sort') renderSort();
  if(s==='del') renderDel();
}

function stockOf(r,t){
  var pct=t>0?Math.round(r/t*100):0;
  if(r<=0)    return {label:'품절',    pct:0,  bar:'var(--darkred)',color:'var(--darkred-text)',bg:'var(--darkred-bg)'};
  if(pct<=30) return {label:'품절 임박',pct:pct,bar:'var(--amber)', color:'var(--amber-text)', bg:'var(--amber-bg)'};
  return             {label:'여유',    pct:pct,bar:'var(--green)', color:'var(--green-text)', bg:'var(--green-bg)'};
}

function renderInventory(){
  var so=inventory.filter(function(i){return i.remain<=0;}).length;
  var no=inventory.filter(function(i){var p=i.total>0?Math.round(i.remain/i.total*100):0;return i.remain>0&&p<=30;}).length;
  document.getElementById('invSummary').innerHTML=
    '<div class="sum-card"><div class="sum-label">전체 품목</div><div class="sum-val">'+inventory.length+'종</div></div>'+
    '<div class="sum-card"><div class="sum-label">품절 임박</div><div class="sum-val" style="color:var(--amber-text)">'+no+'종</div></div>'+
    '<div class="sum-card"><div class="sum-label">품절</div><div class="sum-val" style="color:var(--darkred-text)">'+so+'종</div></div>';

  var h='<tr><th style="text-align:center;width:80px">상태</th><th class="th-img">이미지</th><th style="min-width:130px;text-align:center">상품명</th><th style="min-width:80px;text-align:center">가격</th>';
  if(adminMode) h+='<th>재고</th><th>잔여</th><th style="width:100px">재고율</th>';
  h+='</tr>';
  document.getElementById('invHead').innerHTML=h;

  document.getElementById('invBody').innerHTML=inventory.map(function(item){
    var sl=stockOf(item.remain,item.total);
    var bp=Math.min(100,sl.pct);
    var img=item.img||'';
    var imgCell='';
    if(adminMode){
      imgCell=img
        ?'<div class="inv-thumb-wrap"><img class="inv-thumb" src="'+img+'" data-ms="'+img+'" data-mn="'+item.name+'"><div class="inv-thumb-del" data-del="'+item.id+'">✕</div></div>'
        :'<label class="inv-thumb-empty">+<input type="file" accept="image/*" data-up="'+item.id+'" style="display:none"></label>';
    } else {
      imgCell=img?'<img class="inv-thumb" src="'+img+'" data-ms="'+img+'" data-mn="'+item.name+'">':'<span style="color:var(--text-muted);font-size:11px">-</span>';
    }
    var nm=adminMode?'<input class="inv-input inv-input-wide" type="text" value="'+item.name+'" data-nm="'+item.id+'">'
                    :'<span class="inv-name">'+item.name+'</span>';
    var pr=adminMode?'<input class="inv-input" type="text" value="'+(item.price||'')+'" data-pr="'+item.id+'" placeholder="예:15,000원" style="width:90px">'
                    :'<span style="font-size:12px;color:var(--text-muted)">'+(item.price||'-')+'</span>';
    var ac=adminMode
      ?'<td><input class="inv-input" type="number" min="1" value="'+item.total+'" data-tot="'+item.id+'"></td>'
       +'<td><input class="inv-input" type="number" min="0" value="'+item.remain+'" data-rem="'+item.id+'"></td>'
       +'<td><span class="stock-bar-wrap"><span class="stock-bar-fill" style="width:'+bp+'%;background:'+sl.bar+'"></span></span> <span class="muted">'+sl.pct+'%</span></td>'
      :'';
    return '<tr data-row-id="'+item.id+'">'
      +'<td style="text-align:center"><span class="badge" style="background:'+sl.bg+';color:'+sl.color+'">'+sl.label+'</span></td>'
      +'<td class="td-img">'+imgCell+'</td>'
      +'<td style="text-align:center;vertical-align:middle">'+nm+'</td>'
      +'<td style="text-align:center;vertical-align:middle">'+pr+'</td>'
      +ac
      +'</tr>';
  }).join('');

  if(adminMode) bindInvEvents();
}

function updateRowUI(item, row){
  if(!row) return;
  var sl=stockOf(item.remain, item.total);
  var b=row.querySelector('.stock-bar-fill');
  var p=row.querySelector('.muted');
  var bg=row.querySelector('.badge');
  if(b){b.style.width=Math.min(100,sl.pct)+'%';b.style.background=sl.bar;}
  if(p) p.textContent=sl.pct+'%';
  if(bg){bg.style.background=sl.bg;bg.style.color=sl.color;bg.textContent=sl.label;}
}

function bindInvEvents(){
  function triggerSave(){
    lock(2500);
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveInv, 500);
  }

  document.querySelectorAll('[data-nm]').forEach(function(el){
    el.oninput = function(){
      var item = inventory.find(function(x){return x.id === el.dataset.nm;});
      if(item){ item.name = el.value; triggerSave(); }
    };
  });

  document.querySelectorAll('[data-pr]').forEach(function(el){
    el.oninput = function(){
      var item = inventory.find(function(x){return x.id === el.dataset.pr;});
      if(item){ item.price = el.value; triggerSave(); }
    };
  });

  document.querySelectorAll('[data-tot]').forEach(function(el){
    el.oninput = function(){
      var item = inventory.find(function(x){return x.id === el.dataset.tot;});
      if(item){
        item.total = Math.max(1, parseInt(el.value)||1);
        updateRowUI(item, el.closest('tr'));
        triggerSave();
      }
    };
  });

  document.querySelectorAll('[data-rem]').forEach(function(el){
    el.oninput = function(){
      var item = inventory.find(function(x){return x.id === el.dataset.rem;});
      if(item){
        item.remain = Math.max(0, parseInt(el.value)||0);
        updateRowUI(item, el.closest('tr'));
        triggerSave();
      }
    };
  });

  document.querySelectorAll('[data-up]').forEach(function(el){
    el.onchange = function(){
      var file = el.files[0];
      if(!file) return;
      var item = inventory.find(function(x){return x.id === el.dataset.up;});
      if(!item) return;

      lock(5000);
      var reader = new FileReader();
      reader.onload = function(e){
        var img = new Image();
        img.onload = function(){
          var c = document.createElement('canvas');
          var sw = img.width, sh = img.height;
          var ratio = sw >= sh ? Math.min(285/sh, 1) : Math.min(285/sw, 1);
          c.width = Math.round(sw * ratio); c.height = Math.round(sh * ratio);
          var ctx = c.getContext('2d');
          ctx.drawImage(img, 0, 0, c.width, c.height);
          item.img = c.toDataURL('image/webp', 0.9);
          saveInv();
          renderInventory();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };
  });

  document.querySelectorAll('[data-del]').forEach(function(el){
    el.onclick = function(){
      var item = inventory.find(function(x){return x.id === el.dataset.del;});
      if(item){
        lock(3000);
        item.img = '';
        saveInv();
        renderInventory();
      }
    };
  });
}

function qLevel(s){
  if(s==='혼잡') return {color:'var(--red-text)',bg:'var(--red-bg)',fill:'var(--red)'};
  if(s==='보통') return {color:'var(--amber-text)',bg:'var(--amber-bg)',fill:'var(--amber)'};
  return {color:'var(--green-text)',bg:'var(--green-bg)',fill:'var(--green)'};
}

function renderQueue(){
  var el=document.getElementById('queueContent');
  if(!el) return;
  var nb=document.getElementById('noticeBar');
  if(nb){
    if(queue.notice&&queue.notice.trim()){
      nb.textContent=queue.notice;nb.className='notice-bar';
    } else { nb.className='notice-bar hidden'; }
  }
  var lv=qLevel(queue.status);
  var fh=queue.status==='혼잡'?85:queue.status==='보통'?55:20;

  if(!queue.visible&&!adminMode){
    el.innerHTML='<div class="queue-hidden-notice">현재 현장 등록 대기열 정보가 없습니다.</div>'; return;
  }

  if(!adminMode){
    el.innerHTML='<div class="inv-wrap"><div class="queue-card" style="min-height:260px">'
      +'<div class="queue-fill" style="height:'+fh+'%;background:'+lv.bg+'"></div>'
      +'<div class="queue-inner" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:16px;text-align:center">'
      +'<div style="font-size:12px;color:var(--text-muted);letter-spacing:.06em">현장 등록 대기열</div>'
      +'<div style="font-size:80px;font-weight:700;color:'+lv.color+';line-height:1">'+queue.status+'</div>'
      +'<span class="badge" style="font-size:13px;padding:6px 24px;background:'+lv.bg+';color:'+lv.color+'">'+queue.status+'</span>'
      +'</div></div></div>';
  } else {
    var btns=['여유','보통','혼잡'].map(function(s){
      var lv2=qLevel(s); var on=queue.status===s;
      return '<button data-qs="'+s+'" style="flex:1;min-width:80px;padding:14px 8px;border-radius:var(--radius);border:'+(on?'2px solid '+lv2.fill:'.5px solid var(--border)')+';background:'+(on?lv2.bg:'var(--surface-2)')+';color:'+(on?lv2.color:'var(--text-secondary)')+';font-size:15px;font-weight:'+(on?700:400)+';cursor:pointer;font-family:inherit">'+s+'</button>';
    }).join('');
    el.innerHTML='<div class="inv-wrap"><div class="queue-card">'
      +'<div class="queue-fill" style="height:'+fh+'%;background:'+lv.bg+'"></div>'
      +'<div class="queue-inner">'
      +'<div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">현장 등록 대기열 상태</div>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">'+btns+'</div>'
      +'<div style="margin-bottom:12px">'
      +'<div style="font-size:11px;color:var(--text-muted);margin-bottom:5px;font-weight:600">📢 공지 텍스트</div>'
      +'<textarea id="noticeInput" rows="2" placeholder="예: 현재 대기 인원이 많아 약 20분 소요됩니다." style="width:100%;padding:8px 10px;font-size:13px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-family:inherit;resize:vertical">'+(queue.notice||'')+'</textarea>'
      +'</div>'
      +'<div class="toggle-wrap">'
      +'<label class="toggle'+(queue.visible?' on':'')+'"><input type="checkbox" id="qVis"'+(queue.visible?' checked':'')+'><div class="toggle-track"></div><div class="toggle-thumb"></div></label>'
      +'<span style="font-size:13px">방문자 화면에 '+(queue.visible?'노출 중':'숨김 처리됨')+'</span>'
      +'</div></div></div></div>';

    el.querySelectorAll('[data-qs]').forEach(function(btn){
      btn.onclick = function(){ queue.status=this.dataset.qs; saveQueue(); renderQueue(); };
    });
    var ni=document.getElementById('noticeInput');
    if(ni){
      ni.oninput = function(){
        queue.notice = this.value;
        clearTimeout(saveTimer); saveTimer = setTimeout(saveQueue, 800);
      };
    }
    var qv=document.getElementById('qVis');
    if(qv){
      qv.onchange = function(){
        queue.visible = this.checked;
        saveQueue(); updateQueueTab(); renderQueue();
      };
    }
  }
}

function updateQueueTab(){
  var t=document.getElementById('tab-queue');
  if(!t) return;
  t.style.display=(!adminMode&&!queue.visible)?'none':'';
  if(!adminMode&&!queue.visible) switchTab('inv');
}

function moveItem(from,to){
  if(to<0||to>=inventory.length) return;
  var m=inventory.splice(from,1)[0];
  inventory.splice(to,0,m);
  saveInv(); renderSort();
}

function renderSort(){
  var c=document.getElementById('sortList'); c.innerHTML='';
  inventory.forEach(function(item,i){
    var sl=stockOf(item.remain,item.total);
    var d=document.createElement('div'); d.className='sort-item';
    d.innerHTML='<span class="sort-name">'+item.name+'</span>'
      +'<span class="badge" style="background:'+sl.bg+';color:'+sl.color+'">'+sl.label+'</span>'
      +'<div class="sort-btns">'
      +'<button class="sort-btn" data-up="'+i+'"'+(i===0?' disabled':'')+'>▲</button>'
      +'<button class="sort-btn" data-dn="'+i+'"'+(i===inventory.length-1?' disabled':'')+'>▼</button>'
      +'</div>';
    c.appendChild(d);
  });
  c.querySelectorAll('[data-up]').forEach(function(btn){
    btn.onclick = function(){ moveItem(parseInt(btn.dataset.up), parseInt(btn.dataset.up)-1); };
  });
  c.querySelectorAll('[data-dn]').forEach(function(btn){
    btn.onclick = function(){ moveItem(parseInt(btn.dataset.dn), parseInt(btn.dataset.dn)+1); };
  });
}

function renderDel(){
  var c=document.getElementById('delList'); c.innerHTML='';
  inventory.forEach(function(item){
    var d=document.createElement('div'); d.className='del-list-item';
    d.innerHTML='<input type="checkbox" id="chk-'+item.id+'">'
      +'<label for="chk-'+item.id+'" style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer">'
      +'<span class="del-item-name">'+item.name+'</span>'
      +'<span class="badge" style="background:var(--surface-2);color:var(--text-secondary)">'+item.remain.toLocaleString()+'개</span>'
      +'</label>';
    d.querySelector('input').onchange = function(){ d.classList.toggle('selected', this.checked); };
    c.appendChild(d);
  });
}

function applyColor(id, c){
  var btn=document.getElementById('tab-'+id);
  var bg=document.getElementById('bg-'+id);
  if(!btn) return;
  if(c&&c.length>=4){
    btn.style.background=c;
    var hex=c.replace('#','');
    if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    var r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
    var lum=0.299*r+0.587*g+0.114*b;
    btn.style.color=lum>140?'#1a1a18':'#ffffff';
    btn.style.borderColor=c;
    if(bg){ bg.style.background='rgba('+r+','+g+','+b+',.12)'; bg.style.borderColor='rgba('+r+','+g+','+b+',.3)'; }
  } else {
    btn.style.background=''; btn.style.color=''; btn.style.borderColor='';
    if(bg){ bg.style.background=''; bg.style.borderColor='transparent'; }
  }
}

function applyAllColors(){
  applyColor('inv', tabColors.inv);
  applyColor('queue', tabColors.queue);
}

function saveInv(){
  lock(2000);
  db.ref('inventory').set(inventory)
    .then(function(){ setSync('● 저장됨', true); lockUntil=0; })
    .catch(function(){ setSync('저장 실패', false); lockUntil=0; });
}

function saveQueue(){
  db.ref('queue').set(queue)
    .then(function(){ setSync('● 저장됨', true); })
    .catch(function(){ setSync('저장 실패', false); });
}

function saveTitle(){
  db.ref('title').set({
    eyebrow: document.getElementById('eyebrow-text').textContent,
    main: document.getElementById('title-text').textContent
  });
}

// ── Realtime DB Listeners
db.ref('inventory').on('value', function(snap){
  var d=snap.val();
  if(d && Array.isArray(d) && d.length>0){
    if(!isLocked()){
      inventory = d.map(function(i){ return Object.assign({img:'',price:''},i); });
      renderInventory();
    }
  } else if(!d){ db.ref('inventory').set(inventory); }
});

db.ref('queue').on('value', function(snap){
  var d=snap.val();
  if(d&&d.status){ queue=d; }
  else if(!d){ db.ref('queue').set(queue); }
  if(!isLocked()){ renderQueue(); updateQueueTab(); }
});

db.ref('title').on('value', function(snap){
  var d=snap.val(); if(!d) return;
  if(d.eyebrow){ document.getElementById('eyebrow-text').textContent=d.eyebrow; }
  if(d.main){ document.getElementById('title-text').textContent=d.main; }
});

db.ref('.info/connected').on('value', function(snap){
  var ok = snap.val() === true;
  setSync(ok ? '● 실시간 연동 중' : '○ 연결 끊김', ok);
});

// ── Admin Handlers
var PW='fm5678!';
function enterAdmin(){
  adminMode=true;
  document.getElementById('fabAdmin').classList.add('fab-on');
  document.getElementById('title-edit').style.display='flex';
  ['stab-add','stab-sort','stab-del'].forEach(function(id){ document.getElementById(id).classList.remove('hidden'); });
  document.getElementById('tab-queue').style.display='';
  renderInventory(); renderQueue();
}

function exitAdmin(){
  adminMode=false; lockUntil=0;
  document.getElementById('fabAdmin').classList.remove('fab-on');
  document.getElementById('title-edit').style.display='none';
  ['stab-add','stab-sort','stab-del'].forEach(function(id){ document.getElementById(id).classList.add('hidden'); });
  switchTab('inv'); switchSub('list');
  renderInventory(); renderQueue(); updateQueueTab();
}

document.getElementById('fabAdmin').onclick = function(){
  if(adminMode){ exitAdmin(); return; }
  document.getElementById('pwOverlay').classList.add('show');
  document.getElementById('pwInput').value='';
  document.getElementById('pwError').textContent='';
  setTimeout(function(){ document.getElementById('pwInput').focus(); }, 50);
};

document.getElementById('pwConfirm').onclick = function(){
  if(document.getElementById('pwInput').value === PW){
    document.getElementById('pwOverlay').classList.remove('show');
    enterAdmin();
  } else {
    document.getElementById('pwError').textContent='비밀번호가 맞지 않아요.';
  }
};
document.getElementById('pwCancel').onclick = function(){ document.getElementById('pwOverlay').classList.remove('show'); };

document.getElementById('btnAdd').onclick = function(){
  var name=document.getElementById('new-name').value.trim();
  var price=document.getElementById('new-price').value.trim();
  var total=parseInt(document.getElementById('new-total').value)||0;
  var remain=parseInt(document.getElementById('new-remain').value)||0;
  if(!name || total<1){ alert('상품명과 올바른 수량을 입력해주세요.'); return; }

  inventory.push({id:uid(), name:name, price:price, total:total, remain:Math.min(remain,total), img:''});
  ['new-name','new-price','new-total','new-remain'].forEach(function(id){ document.getElementById(id).value=''; });
  lockUntil=0; saveInv(); renderInventory(); switchSub('list');
};

document.getElementById('btnDel').onclick = function(){
  var chk = [].slice.call(document.querySelectorAll('#delList input:checked'));
  if(!chk.length) return;
  if(!confirm(chk.length + '개 항목을 삭제할까요?')) return;
  var ids = chk.map(function(c){ return c.id.replace('chk-',''); });
  inventory = inventory.filter(function(x){ return ids.indexOf(x.id) === -1; });
  lockUntil=0; saveInv(); renderInventory(); switchSub('list');
};

document.getElementById('input-eyebrow').oninput = function(){
  document.getElementById('eyebrow-text').textContent=this.value; saveTitle();
};
document.getElementById('input-title').oninput = function(){
  document.getElementById('title-text').textContent=this.value; saveTitle();
};

document.getElementById('imgModal').onclick = function(e){
  if(e.target === this || e.target.id === 'imgModalClose') this.classList.remove('show');
};
document.addEventListener('click', function(e){
  if(e.target.dataset.ms){
    document.getElementById('imgModalImg').src = e.target.dataset.ms;
    document.getElementById('imgModalName').textContent = e.target.dataset.mn||'';
    document.getElementById('imgModal').classList.add('show');
  }
});

renderInventory();
</script>
</body>
</html>
