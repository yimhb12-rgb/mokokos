<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOKOKO STREET POP-UP in SEONGSU — 운영 현황판</title>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--surface:#fff;--surface-2:#f9f9f8;
  --border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.16);
  --text-primary:#1a1a18;--text-secondary:#5a5a56;--text-muted:#999990;
  --radius:8px;
  --green:#1D9E75;--green-bg:rgba(225,245,238,.7);--green-text:#085041;
  --amber:#BA7517;--amber-bg:rgba(250,238,218,.7);--amber-text:#854F0B;
  --red:#A32D2D;--red-bg:rgba(252,235,235,.7);--red-text:#791F1F;
  --darkred:#791F1F;--darkred-bg:rgba(252,235,235,.85);--darkred-text:#501313;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--surface:#1c1c1a;--surface-2:#222220;
  --border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.18);
  --text-primary:#f0f0ec;--text-secondary:#a8a8a0;--text-muted:#666660;
}}
body{background:var(--bg);color:var(--text-primary);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;min-height:100vh;-webkit-text-size-adjust:100%}
.wrap{max-width:920px;margin:0 auto;padding:20px 16px 80px}
.header{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:14px;border-bottom:.5px solid var(--border);margin-bottom:16px;gap:12px}
.eyebrow{font-size:11px;color:var(--text-muted);letter-spacing:.08em;margin-bottom:3px}
.main-title{font-size:17px;font-weight:600;cursor:default;user-select:none;-webkit-user-select:none}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.clock-wrap{font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:4px}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.sync-txt{font-size:11px;margin-right:4px}
.btn{padding:8px 16px;font-size:13px;border-radius:var(--radius);border:.5px solid var(--border-strong);background:var(--surface);color:var(--text-primary);cursor:pointer;font-family:inherit;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:36px}
.btn.active-mode{background:var(--text-primary);color:var(--bg);border-color:var(--text-primary)}
.btn-danger{border-color:var(--red);color:var(--red-text)}
.btn-add{border-color:var(--green);color:var(--green-text)}
.title-edit{display:none;flex-direction:column;gap:6px;margin-top:10px;padding:10px 12px;background:var(--surface-2);border-radius:var(--radius);border:.5px solid var(--border)}
.edit-row{display:flex;align-items:center;gap:8px}
.edit-row label{font-size:11px;color:var(--text-muted);width:48px;flex-shrink:0}
.edit-row input[type=text]{flex:1;padding:8px 10px;font-size:16px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text-primary);font-family:inherit}
.tabs{display:flex;gap:2px;background:var(--surface-2);border-radius:var(--radius);padding:3px;margin-bottom:16px;border:.5px solid var(--border)}
.tab{flex:1;padding:10px 0;font-size:13px;text-align:center;border-radius:6px;cursor:pointer;border:none;background:transparent;color:var(--text-secondary);font-family:inherit;transition:all .15s;touch-action:manipulation;min-height:40px}
.tab.active{background:var(--surface);color:var(--text-primary);font-weight:600;border:.5px solid var(--border)}
.sub-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.sub-tab{padding:7px 16px;font-size:12px;border-radius:20px;cursor:pointer;border:.5px solid var(--border);background:transparent;color:var(--text-secondary);font-family:inherit;touch-action:manipulation;min-height:34px}
.sub-tab.active{background:var(--text-primary);color:var(--bg);border-color:var(--text-primary)}
.sub-tab.danger-tab{color:var(--red-text)}
.sub-tab.danger-tab.active{background:var(--red-text);color:#fff;border-color:var(--red-text)}
.inv-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sum-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:10px 8px;text-align:center}
.sum-label{font-size:10px;color:var(--text-muted);margin-bottom:3px}
.sum-val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.inv-wrap{background:var(--surface);border:.5px solid var(--border);border-radius:12px;overflow:hidden}
.inv-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:320px}
th{text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);padding:10px 12px;border-bottom:.5px solid var(--border);background:var(--surface-2);white-space:nowrap}
th.th-img{text-align:center;width:160px}
td{padding:10px 12px;border-bottom:.5px solid var(--border);vertical-align:middle}
td.td-img{text-align:center;vertical-align:middle;width:160px;padding:10px}
.td-img>*{margin:0 auto}
tr:last-child td{border-bottom:none}
.cat-pill{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface-2);color:var(--text-secondary);border:.5px solid var(--border);white-space:nowrap}
.inv-input{padding:6px 8px;font-size:16px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-family:inherit;width:80px}
.inv-input-wide{width:120px}
.muted{color:var(--text-muted);font-size:12px;font-variant-numeric:tabular-nums}
.inv-thumb{max-width:144px;max-height:144px;width:auto;height:auto;border-radius:6px;border:.5px solid var(--border);background:var(--surface-2);display:inline-block;object-fit:contain;cursor:zoom-in;transition:opacity .15s;vertical-align:middle}
.inv-thumb:hover{opacity:.85}
.inv-thumb-empty{width:144px;height:144px;border-radius:6px;border:.5px dashed var(--border-strong);background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:24px;cursor:pointer;margin:0 auto}
.inv-thumb-wrap{position:relative;width:fit-content;margin:0 auto;display:flex;align-items:center;justify-content:center}
.inv-thumb-wrap:hover .inv-thumb-del{display:flex}
.inv-thumb-del{display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);border-radius:6px;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#fff}
.inv-name-td{min-width:120px;max-width:200px;padding:8px 10px;vertical-align:middle}
.inv-name{font-weight:600;font-size:13px;line-height:1.4;word-break:keep-all;overflow-wrap:break-word}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.hidden{display:none}
.add-form{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:18px}
.add-form h3{font-size:14px;font-weight:600;margin-bottom:6px}
.add-form .sub-desc{font-size:12px;color:var(--text-muted);margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field label{font-size:11px;color:var(--text-muted);font-weight:600}
.form-field input{padding:10px;font-size:16px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-family:inherit}
.form-field input:focus{outline:none;border-color:var(--green)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.del-list-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius);border:.5px solid var(--border);margin-bottom:6px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.del-list-item.selected{background:var(--red-bg);border-color:var(--red)}
.del-list-item input[type=checkbox]{width:18px;height:18px;cursor:pointer;flex-shrink:0;accent-color:var(--red-text)}
.del-item-name{font-size:13px;font-weight:600;flex:1}
.del-item-cat{font-size:11px;color:var(--text-muted)}
.del-count-badge{font-size:12px;font-weight:600;color:var(--red-text);background:var(--red-bg);padding:2px 8px;border-radius:20px}
.img-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:999;cursor:pointer}
.img-modal-overlay.show{display:flex}
.img-modal-inner{position:relative;max-width:90vw;max-height:90vh}
.img-modal-inner img{max-width:90vw;max-height:85vh;width:auto;height:auto;border-radius:10px;display:block;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.img-modal-close{position:absolute;top:-14px;right:-14px;width:30px;height:30px;border-radius:50%;background:#fff;color:#111;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.img-modal-name{text-align:center;margin-top:12px;font-size:13px;color:#fff;opacity:.85}
.toggle-wrap{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)}
.toggle{position:relative;width:44px;height:24px;cursor:pointer;display:inline-flex;align-items:center}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border-strong);border-radius:24px;transition:.2s}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .toggle-track{background:var(--green)}
.toggle.on .toggle-thumb{left:23px}
.queue-card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.queue-fill{position:absolute;left:0;right:0;bottom:0;opacity:.45;transition:height .4s}
.queue-inner{position:relative}
.queue-hidden-notice{text-align:center;padding:20px;font-size:13px;color:var(--text-muted);background:var(--surface);border-radius:12px;border:.5px dashed var(--border)}
#fabAdmin{position:fixed;bottom:24px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--surface);border:.5px solid var(--border-strong);color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.12);transition:background .15s,color .15s,transform .15s;z-index:90;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#fabAdmin:active{transform:scale(.93)}
#fabAdmin.fab-admin-on{background:var(--text-primary);color:var(--bg);border-color:var(--text-primary)}
#fabAdmin svg{display:block}
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:999;display:none}
.pw-overlay.show{display:flex}
.pw-modal{background:var(--surface);border-radius:14px;border:.5px solid var(--border);padding:28px 28px 24px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.pw-modal h3{font-size:15px;font-weight:600;margin-bottom:4px}
.pw-modal p{font-size:12px;color:var(--text-muted);margin-bottom:18px}
.pw-input-wrap{position:relative;margin-bottom:10px}
.pw-input-wrap input{width:100%;padding:9px 36px 9px 12px;font-size:14px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-family:inherit;letter-spacing:.08em}
.pw-input-wrap input:focus{outline:none;border-color:var(--green)}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:0}
.pw-error{font-size:12px;color:var(--red-text);margin-bottom:12px;min-height:16px}
.pw-actions{display:flex;gap:8px;justify-content:flex-end}
.stock-bar-wrap{width:68px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.notice-bar{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;line-height:1.6;word-break:keep-all;border:.5px solid var(--border)}
.section-bg{min-height:60vh;border-radius:12px;padding:14px;transition:background .3s,border-color .3s;border:.5px solid transparent;}
.color-picker-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:10px;padding:12px;background:var(--surface-2);border-radius:var(--radius);border:.5px solid var(--border)}
.color-picker-row label{font-size:11px;color:var(--text-muted);flex-shrink:0}
.tab-color-item{display:flex;flex-direction:column;gap:6px;flex:1;min-width:120px}
.tab-color-label{font-size:10px;color:var(--text-muted);font-weight:600}
.tab-color-controls{display:flex;align-items:center;gap:8px}
.color-input-wrap{position:relative;width:36px;height:36px;border-radius:50%;overflow:hidden;border:.5px solid var(--border-strong);cursor:pointer;flex-shrink:0}
.color-input-wrap input[type=color]{position:absolute;width:200%;height:200%;top:-50%;left:-50%;border:none;cursor:pointer;padding:0;background:none}
.color-preview{width:36px;height:36px;border-radius:50%;border:.5px solid var(--border-strong);pointer-events:none}
.preset-swatches{display:flex;gap:4px;flex-wrap:wrap}
.swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0}
.swatch:hover{transform:scale(1.2)}
.swatch.active{border-color:var(--text-primary);transform:scale(1.1)}
.swatch-clear{width:20px;height:20px;border-radius:50%;cursor:pointer;border:1.5px solid var(--border-strong);background:var(--surface);font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);flex-shrink:0;transition:transform .1s}
.swatch-clear:hover{transform:scale(1.2)}
.sort-list{display:flex;flex-direction:column;gap:6px}
.sort-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius)}
.sort-name{font-size:13px;font-weight:600;flex:1}
.sort-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.sort-btns{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.sort-btn{width:28px;height:24px;border:none;border-radius:4px;background:var(--surface-2);color:var(--text-secondary);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.sort-btn:active{background:var(--border-strong)}
.sort-btn:disabled{opacity:.25;cursor:default}
.stock-bar-fill{height:100%;border-radius:3px;transition:width .4s}
@media(max-width:480px){
  .wrap{padding:14px 12px 80px}
  .header{flex-direction:column;gap:10px}
  .header-right{width:100%;justify-content:space-between}
  .main-title{font-size:16px}
  .inv-summary{gap:6px}
  .inv-summary .sum-val{font-size:15px}
  .form-grid{grid-template-columns:1fr}
  .tab{font-size:12px;padding:9px 0}
  .tabs{margin-bottom:14px}
  .form-actions{justify-content:stretch}
  .form-actions .btn{flex:1;text-align:center}
  .inv-name-td{min-width:120px;max-width:180px}
  .inv-name{font-size:12px}
  table{min-width:240px}
}
</style>
</head>
<body>

<div class="pw-overlay" id="pwOverlay">
  <div class="pw-modal">
    <h3>관리자 확인</h3>
    <p>관리자 모드에 접근하려면 비밀번호를 입력해주세요.</p>
    <div class="pw-input-wrap">
      <input type="password" id="pwInput" placeholder="비밀번호 입력" autocomplete="off">
      <button class="pw-toggle" id="pwToggle">👁</button>
    </div>
    <div class="pw-error" id="pwError"></div>
    <div class="pw-actions">
      <button class="btn" id="pwCancel">취소</button>
      <button class="btn btn-add" id="pwConfirm">확인</button>
    </div>
  </div>
</div>

<div class="img-modal-overlay" id="imgModalOverlay">
  <div class="img-modal-inner">
    <button class="img-modal-close" id="imgModalClose">✕</button>
    <img id="imgModalImg" src="" alt="">
    <div class="img-modal-name" id="imgModalName"></div>
  </div>
</div>

<button id="fabAdmin" aria-label="관리자 모드">
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</button>

<div class="wrap">
  <div class="header">
    <div style="flex:1;min-width:0">
      <div class="eyebrow" id="eyebrow-text">MOKOKO STREET POP-UP in SEONGSU</div>
      <div class="main-title" id="title-text">운영 현황판</div>
      <div class="title-edit" id="title-edit">
        <div class="edit-row"><label>부제목</label><input type="text" id="input-eyebrow" value="MOKOKO STREET POP-UP in SEONGSU"></div>
        <div class="edit-row"><label>타이틀</label><input type="text" id="input-title" value="운영 현황판"></div>
        <div class="color-picker-row">
          <label>탭 컬러</label>
          <div class="tab-color-item">
            <div class="tab-color-label">재고 현황</div>
            <div class="tab-color-controls">
              <div class="color-input-wrap" title="직접 색상 선택">
                <input type="color" id="colorpicker-inv" value="#ffffff">
              </div>
              <div class="preset-swatches" id="swatches-inv"></div>
            </div>
          </div>
          <div class="tab-color-item">
            <div class="tab-color-label">현장 등록 대기열</div>
            <div class="tab-color-controls">
              <div class="color-input-wrap" title="직접 색상 선택">
                <input type="color" id="colorpicker-queue" value="#ffffff">
              </div>
              <div class="preset-swatches" id="swatches-queue"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="clock-wrap">
        <span class="pulse" id="pulse"></span>
        <span class="sync-txt" id="syncStatus">연결 중…</span>
        <span id="clock">--:--:--</span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-inv" data-tabid="inv" onclick="switchTab('inv')">📦 재고 현황</button>
    <button class="tab" id="tab-queue" data-tabid="queue" onclick="switchTab('queue')">🙋 현장 등록 대기열</button>
  </div>

  <!-- 재고 현황 탭 -->
  <div id="section-inv">
    <div class="section-bg" id="bg-inv">
    <div class="sub-tabs">
      <button class="sub-tab active" id="stab-list" onclick="switchSubTab('list')">재고 현황</button>
      <button class="sub-tab hidden" id="stab-add" onclick="switchSubTab('add')">+ 항목 추가</button>
      <button class="sub-tab hidden" id="stab-sort" onclick="switchSubTab('sort')">순서 변경</button>
      <button class="sub-tab danger-tab hidden" id="stab-del" onclick="switchSubTab('del')">항목 삭제</button>
    </div>
    <div id="ssection-list">
      <div class="inv-summary" id="invSummary"></div>
      <div class="inv-wrap"><div class="inv-scroll">
        <table><thead id="invHead"></thead><tbody id="invBody"></tbody></table>
      </div></div>
    </div>
    <div id="ssection-add" class="hidden">
      <div class="add-form">
        <h3>새 항목 추가</h3>
        <p class="sub-desc">추가 후 재고 현황에서 수량을 바로 수정할 수 있어요.</p>
        <div class="form-grid">
          <div class="form-field"><label>상품명 *</label><input type="text" id="new-name" placeholder="예: 모코코 아크릴 스탠드"></div>

        <div class="sort-list" id="sortList"></div>

          <button class="btn" onclick="switchSubTab('list')">완료</button>
        </div>

    </div>

        <h3>항목 삭제</h3>
        <p class="sub-desc">삭제할 항목을 선택한 뒤 삭제 버튼을 눌러주세요.</p>
        <div id="delList"></div>
        <div class="form-actions" style="margin-top:14px">
          <button class="btn" onclick="switchSubTab('list')">취소</button>
          <button class="btn btn-danger" id="confirmDelBtn">선택 항목 삭제</button>
        </div>
      </div>
    </div>
    </div><!-- /bg-inv -->
  </div>

  <!-- 현장 등록 대기열 탭 -->
  <div id="section-queue" class="hidden">
    <div class="section-bg" id="bg-queue">
      <div id="noticeBar" class="notice-bar hidden"></div>
      <div id="queueContent"></div>
    </div>
  </div>
</div>

<script>
// ── Firebase 초기화
var db = firebase.initializeApp({ databaseURL:'https://mokokos-default-rtdb.asia-southeast1.firebasedatabase.app' }).database();

// ── 기본 데이터
var DEFAULT_INVENTORY = [
  {id:'f1',name:'여름방학 피규어 (3종)',cat:'피규어',price:'18,000원',total:6000,remain:4200,img:''},
  {id:'f2',price:'7,000원',name:'모니터 랜덤 피규어 (4종)',cat:'피규어',total:10000,remain:7800,img:''},
  {id:'k1',price:'16,000원',name:'모코코 인형 키링',cat:'키링·파우치',total:1600,remain:980,img:''},
  {id:'k2',price:'15,000원',name:'손목 쿠션',cat:'키링·파우치',total:1600,remain:640,img:''},
  {id:'k3',price:'10,000원',name:'모코코 가방키링',cat:'키링·파우치',total:1600,remain:1230,img:''},
  {id:'k4',price:'15,000원',name:'모코코 얼굴 인형 랜덤키링 (4종)',cat:'키링·파우치',total:1600,remain:180,img:''},
  {id:'k5',price:'12,000원',name:'모코코 미니 파우치',cat:'키링·파우치',total:2000,remain:1540,img:''},
  {id:'d1',price:'32,000원',name:'텀블러',cat:'데일리',total:1000,remain:720,img:''},
  {id:'d2',price:'25,000원',name:'장패드',cat:'데일리',total:1000,remain:390,img:''},
  {id:'d3',price:'15,000원',name:'캐릭터 마그넷 오프너',cat:'데일리',total:3000,remain:2100,img:''},
  {id:'d4',price:'5,000원',name:'카드 스티커 (2종)',cat:'데일리',total:1000,remain:68,img:''},
  {id:'d5',price:'5,000원',name:'물방울 스티커',cat:'데일리',total:1000,remain:520,img:''},
  {id:'d6',price:'34,000원',name:'모코코 선풍기',cat:'데일리',total:1000,remain:290,img:''},
  {id:'d7',price:'—',name:'LED 4구 키캡키링',cat:'데일리',total:1000,remain:850,img:''}
];
var DEFAULT_QUEUE = {status:'여유',visible:true,notice:''};
var tabColors = {inv:'',queue:''};

var inventory = JSON.parse(JSON.stringify(DEFAULT_INVENTORY));
var queue = Object.assign({},DEFAULT_QUEUE);
var adminMode = false;
var idSeq = 100;
var lockUntil = 0;

function uid(){ return 'u'+(++idSeq); }
function isLocked(){ return Date.now() < lockUntil; }
function lock(ms){ lockUntil = Date.now() + (ms||2000); }

// ── 상태 표시
function setSyncStatus(text, ok){
  var el = document.getElementById('syncStatus');
  var p  = document.getElementById('pulse');
  if(el){ el.textContent = text; el.style.color = ok ? 'var(--green-text)' : 'var(--amber-text)'; }
  if(p)  p.style.background = ok ? 'var(--green)' : 'var(--amber)';
}

// ── 시계
function tickClock(){
  var el = document.getElementById('clock');
  if(!el){ setTimeout(tickClock,100); return; }
  var n = new Date();
  el.textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
}
tickClock();
setInterval(tickClock,1000);

// ── 탭 전환
function switchTab(tab){
  ['inv','queue'].forEach(function(t){
    document.getElementById('section-'+t).classList.toggle('hidden', t!==tab);
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  if(tab==='queue') renderQueue();
}
function switchSubTab(sub){
  ['list','add','sort','del'].forEach(function(s){
    document.getElementById('ssection-'+s).classList.toggle('hidden', s!==sub);
    document.getElementById('stab-'+s).classList.toggle('active', s===sub);
  });
  if(sub==='add') document.getElementById('new-name').focus();
  if(sub==='sort') renderSortList();
  if(sub==='del') renderDelList();
}

// ── 상태 계산
function stockOf(r,t){
  var pct = t>0 ? Math.round(r/t*100) : 0;
  if(r<=0)    return {label:'품절',    pct:0,   bar:'var(--darkred)',color:'var(--darkred-text)',bg:'var(--darkred-bg)'};
  if(pct<=30) return {label:'품절 임박',pct:pct, bar:'var(--amber)', color:'var(--amber-text)', bg:'var(--amber-bg)'};
  return             {label:'여유',    pct:pct, bar:'var(--green)', color:'var(--green-text)', bg:'var(--green-bg)'};
}
function queueLevelOf(s){
  if(s==='혼잡') return {color:'var(--red-text)',  bg:'var(--red-bg)',  fill:'var(--red)'};
  if(s==='보통') return {color:'var(--amber-text)',bg:'var(--amber-bg)',fill:'var(--amber)'};
  return               {color:'var(--green-text)',bg:'var(--green-bg)',fill:'var(--green)'};
}

// ── 재고 렌더링
function renderInventory(){
  var soldOut = inventory.filter(function(i){return i.remain<=0;}).length;
  var nearOut = inventory.filter(function(i){var p=i.total>0?Math.round(i.remain/i.total*100):0;return i.remain>0&&p<=30;}).length;
  document.getElementById('invSummary').innerHTML =
    '<div class="sum-card"><div class="sum-label">전체 품목</div><div class="sum-val">'+inventory.length+'종</div></div>'+
    '<div class="sum-card"><div class="sum-label">품절 임박</div><div class="sum-val" style="color:var(--amber-text)">'+nearOut+'종</div></div>'+
    '<div class="sum-card"><div class="sum-label">품절</div><div class="sum-val" style="color:var(--darkred-text)">'+soldOut+'종</div></div>';

  var headHtml = '<tr><th style="text-align:center;width:80px">상태</th><th class="th-img">이미지</th><th style="min-width:130px;text-align:center">상품명</th><th style="min-width:80px;text-align:center">가격</th>';
  if(adminMode) headHtml += '<th>재고 수량</th><th>잔여 수량</th><th style="width:100px">재고율</th>';
  headHtml += '</tr>';
  document.getElementById('invHead').innerHTML = headHtml;

  document.getElementById('invBody').innerHTML = inventory.map(function(item,idx){
    var sl = stockOf(item.remain, item.total);
    var barPct = Math.min(100, sl.pct);
    var imgSrc = item.img || '';
    var imgCellInner = '';
    if(imgSrc){
      imgCellInner = adminMode
        ? '<div class="inv-thumb-wrap"><img class="inv-thumb" src="'+imgSrc+'" data-modal-src="'+imgSrc+'" data-modal-name="'+item.name+'"><div class="inv-thumb-del" data-imgdel="'+item.id+'">✕</div></div>'
        : '<img class="inv-thumb" src="'+imgSrc+'" data-modal-src="'+imgSrc+'" data-modal-name="'+item.name+'">';
    } else {
      imgCellInner = adminMode
        ? '<label class="inv-thumb-empty" title="이미지 추가">+<input type="file" accept="image/*" data-imgup="'+item.id+'" style="display:none"></label>'
        : '<span style="color:var(--text-muted);font-size:11px">-</span>';
    }
    var namePart = adminMode ? '<input class="inv-input inv-input-wide" type="text" value="'+item.name+'" data-iname="'+item.id+'">' : '<span class="inv-name">'+item.name+'</span>';

    var adminCols = adminMode
      ? '<td style="vertical-align:middle"><input class="inv-input" type="number" min="1" value="'+item.total+'" data-itotal="'+item.id+'"></td>'+
        '<td style="vertical-align:middle"><input class="inv-input" type="number" min="0" value="'+item.remain+'" data-inv="'+item.id+'"></td>'+
        '<td style="vertical-align:middle"><span class="stock-bar-wrap"><span class="stock-bar-fill" style="width:'+barPct+'%;background:'+sl.bar+'"></span></span><span class="muted" style="margin-left:4px">'+sl.pct+'%</span></td>'
      : '';
    return '<tr>'+
      '<td style="vertical-align:middle;text-align:center"><span class="badge" style="background:'+sl.bg+';color:'+sl.color+'">'+sl.label+'</span></td>'+
      '<td class="td-img">'+imgCellInner+'</td>'+
      '<td class="inv-name-td" style="text-align:center"><div style="display:flex;align-items:center;justify-content:center">'+namePart+'</div></td>'+
      '<td style="vertical-align:middle;text-align:center">'+(adminMode?'<input class="inv-input" type="text" value="'+(item.price||'')+'" data-iprice="'+item.id+'" placeholder="예: 15,000원" style="width:100px">':'<span style="font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums">'+(item.price||'-')+'</span>')+'</td>'+
      adminCols+
    '</tr>';
  }).join('');

  if(adminMode) bindInvListeners();
}

function bindInvListeners(){
  var dbt = {};
  function dbn(k,fn,d){ clearTimeout(dbt[k]); lock(d+2000); dbt[k]=setTimeout(fn,d); }

  document.querySelectorAll('input[data-iname]').forEach(function(inp){
    inp.addEventListener('input',function(){
      inventory.find(function(x){return x.id===inp.dataset.iname;}).name=inp.value;
      dbn('n'+inp.dataset.iname,saveInventory,800);
    });
  });
  document.querySelectorAll('input[data-iprice]').forEach(function(inp){
    inp.addEventListener('input',function(){
      inventory.find(function(x){return x.id===inp.dataset.iprice;}).price=inp.value;
      dbn('p'+inp.dataset.iprice,saveInventory,800);
    });
  });
  document.querySelectorAll('input[data-itotal]').forEach(function(inp){
    inp.addEventListener('input',function(){
      var item=inventory.find(function(x){return x.id===inp.dataset.itotal;});
      item.total=Math.max(1,parseInt(inp.value)||1);
      updateInvRow(item,inp.closest('tr'));
      dbn('t'+item.id,saveInventory,600);
    });
  });
  document.querySelectorAll('input[data-inv]').forEach(function(inp){
    inp.addEventListener('input',function(){
      var item=inventory.find(function(x){return x.id===inp.dataset.inv;});
      item.remain=Math.max(0,parseInt(inp.value)||0);
      updateInvRow(item,inp.closest('tr'));
      dbn('r'+item.id,saveInventory,600);
    });
  });
  document.querySelectorAll('input[data-imgup]').forEach(function(inp){
    inp.addEventListener('change',function(){
      var file=this.files[0]; if(!file) return;
      var item=inventory.find(function(x){return x.id===inp.dataset.imgup;});
      var reader=new FileReader();
      reader.onload=function(e){
        var img=new Image();
        img.onerror=function(){
          alert('이미지를 불러올 수 없어요. 다른 파일을 시도해보세요.');
        };
        img.onload=function(){
          try {
            // 원본이 너무 크면 먼저 절반으로 축소 (메모리 초과 방지)
            var srcW=img.width, srcH=img.height;
            while(srcW>2000||srcH>2000){ srcW=Math.round(srcW/2); srcH=Math.round(srcH/2); }
            // 최종 사이즈 계산
            var isLandscape=srcW>=srcH;
            var MAX=285;
            var ratio=isLandscape?Math.min(MAX/srcH,1):Math.min(MAX/srcW,1);
            var w=Math.round(srcW*ratio),h=Math.round(srcH*ratio);
            var c=document.createElement('canvas');
            c.width=w; c.height=h;
            var ctx=c.getContext('2d');
            ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
            ctx.drawImage(img,0,0,w,h);
            item.img=c.toDataURL('image/webp',0.92);
            saveInventory(); renderInventory();
          } catch(err) {
            console.error('이미지 처리 오류:', err);
            // WebP 실패 시 JPEG로 재시도
            try {
              item.img=c.toDataURL('image/jpeg',0.85);
              saveInventory(); renderInventory();
            } catch(e2) {
              alert('이미지 처리에 실패했어요. 파일 크기를 줄이거나 다른 형식으로 시도해보세요.');
            }
          }
        };
        img.src=e.target.result;
      };
      reader.readAsDataURL(file);
    });
  });
  document.querySelectorAll('[data-imgdel]').forEach(function(el){
    el.addEventListener('click',function(){
      var item=inventory.find(function(x){return x.id===el.dataset.imgdel;});
      if(item){item.img='';saveInventory();renderInventory();}
    });
  });
}

function updateInvRow(item,row){
  if(!row) return;
  var sl=stockOf(item.remain,item.total);
  var barEl=row.querySelector('.stock-bar-fill');
  var pctEl=row.querySelector('.muted');
  var badgeEl=row.querySelector('.badge');
  if(barEl){barEl.style.width=Math.min(100,sl.pct)+'%';barEl.style.background=sl.bar;}
  if(pctEl) pctEl.textContent=sl.pct+'%';
  if(badgeEl){badgeEl.style.background=sl.bg;badgeEl.style.color=sl.color;badgeEl.textContent=sl.label;}
}

// ── 현장 등록 대기열 렌더링
function renderQueue(){
  var el=document.getElementById('queueContent');
  if(!el) return;
  // 공지 업데이트
  var nb=document.getElementById('noticeBar');
  if(nb){
    if(queue.notice&&queue.notice.trim()){
      nb.textContent=queue.notice;
      nb.className='notice-bar';
      nb.style.background='#ffffff';
      nb.style.color='var(--text-primary)';
      nb.style.borderColor='var(--border-strong)';
    } else {
      nb.className='notice-bar hidden';
    }
  }
  var lv=queueLevelOf(queue.status);
  var fillH=queue.status==='혼잡'?85:queue.status==='보통'?55:20;
  if(!queue.visible&&!adminMode){
    el.innerHTML='<div class="queue-hidden-notice">현재 현장 등록 대기열 정보가 없습니다.</div>';
    return;
  }
  var html='';
  if(!adminMode){
    html='<div class="inv-wrap">'+
      '<div class="queue-card" style="min-height:260px">'+
      '<div class="queue-fill" style="height:'+fillH+'%;background:'+lv.bg+'"></div>'+
      '<div class="queue-inner" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:16px;text-align:center">'+
      '<div style="font-size:12px;color:var(--text-muted);letter-spacing:.06em">현장 등록 대기열</div>'+
      '<div style="font-size:80px;font-weight:700;color:'+lv.color+';line-height:1;letter-spacing:-.02em">'+queue.status+'</div>'+
      '<span class="badge" style="font-size:13px;padding:6px 24px;background:'+lv.bg+';color:'+lv.color+'">'+queue.status+'</span>'+
      '</div></div></div>'+
      '<div style="display:flex;gap:14px;font-size:12px;color:var(--text-secondary);margin-top:10px;padding:0 2px">'+
      '<div style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span>여유</div>'+
      '<div style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--amber);display:inline-block"></span>보통</div>'+
      '<div style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block"></span>혼잡</div>'+
      '</div>';;
  } else {
    html='<div class="inv-wrap" style="margin-bottom:12px"><div class="queue-card">'+
      '<div class="queue-fill" style="height:'+fillH+'%;background:'+lv.bg+'"></div>'+
      '<div class="queue-inner">'+
      '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">현장 등록 대기열 상태</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">';
    ['여유','보통','혼잡'].forEach(function(s){
      var slv=queueLevelOf(s);
      var on=queue.status===s;
      html+='<button data-qs="'+s+'" style="flex:1;min-width:80px;padding:14px 8px;border-radius:var(--radius);border:'+(on?'2px solid '+slv.fill:'.5px solid var(--border)')+';background:'+(on?slv.bg:'var(--surface-2)')+';color:'+(on?slv.color:'var(--text-secondary)')+';font-size:15px;font-weight:'+(on?700:400)+';cursor:pointer;font-family:inherit;touch-action:manipulation">'+s+'</button>';
    });
    html+='</div>'+
      '<div style="margin-bottom:12px">'+
      '<div style="font-size:11px;color:var(--text-muted);margin-bottom:5px;font-weight:600">📢 공지 텍스트</div>'+
      '<textarea id="queueNoticeInput" rows="2" placeholder="예: 현재 대기 인원이 많아 입장까지 약 20분 소요됩니다." style="width:100%;padding:8px 10px;font-size:13px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-family:inherit;resize:vertical;line-height:1.6">'+( queue.notice||'' )+'</textarea>'+
      '</div>'+
      '<div class="toggle-wrap">'+
      '<label class="toggle'+(queue.visible?' on':'')+'">'+
      '<input type="checkbox" id="queueVisToggle"'+(queue.visible?' checked':'')+'>'+
      '<div class="toggle-track"></div><div class="toggle-thumb"></div></label>'+
      '<span style="font-size:13px">방문자 화면에 '+(queue.visible?'노출 중':'숨김 처리됨')+'</span>'+
      '</div></div></div></div>';
  }
  el.innerHTML=html;
  if(adminMode){
    el.querySelectorAll('button[data-qs]').forEach(function(btn){
      btn.addEventListener('click',function(){
        queue.status=this.dataset.qs;
        saveQueue();renderQueue();
      });
    });
    var tog=document.getElementById('queueVisToggle');
    if(tog) tog.addEventListener('change',function(){
      queue.visible=this.checked;
      this.closest('.toggle').classList.toggle('on',this.checked);
      this.closest('.toggle-wrap').querySelector('span').textContent='방문자 화면에 '+(this.checked?'노출 중':'숨김 처리됨');
      updateQueueTab();saveQueue();
    });
    var noticeInp=document.getElementById('queueNoticeInput');
    if(noticeInp){
      var _nt=null;
      noticeInp.addEventListener('input',function(){
        queue.notice=this.value;
        // noticeBar만 직접 업데이트 (renderQueue 호출 안 함 → 포커스 유지)
        var nb=document.getElementById('noticeBar');
        if(nb){
          if(queue.notice.trim()){
            nb.textContent=queue.notice;
            nb.className='notice-bar';
            nb.style.background='#ffffff';
            nb.style.color='var(--text-primary)';
            nb.style.borderColor='var(--border-strong)';
          } else {
            nb.className='notice-bar hidden';
          }
        }
        clearTimeout(_nt);
        _nt=setTimeout(function(){ saveQueue(); },800);
      });
    }
  }
}

function updateQueueTab(){
  var t=document.getElementById('tab-queue');
  if(!t) return;
  t.style.display=(!adminMode&&!queue.visible)?'none':'';
  if(!adminMode&&!queue.visible) switchTab('inv');
}

// ── 항목 삭제 리스트
function moveItem(fromIdx, toIdx){
  if(toIdx<0||toIdx>=inventory.length) return;
  var moved=inventory.splice(fromIdx,1)[0];
  inventory.splice(toIdx,0,moved);
  saveInventory();
  renderSortList();
}

function renderSortList(){
  var container=document.getElementById('sortList');
  container.innerHTML='';
  inventory.forEach(function(item,i){
    var sl=stockOf(item.remain,item.total);
    var div=document.createElement('div');
    div.className='sort-item';
    var imgEl=item.img?'<img src="'+item.img+'" style="width:36px;height:36px;object-fit:contain;border-radius:4px;border:.5px solid var(--border);flex-shrink:0">':'';
    div.innerHTML=
      imgEl+
      '<span class="sort-name">'+item.name+'</span>'+
      '<span class="sort-badge" style="background:'+sl.bg+';color:'+sl.color+'">'+sl.label+'</span>'+
      '<div class="sort-btns">'+
        '<button class="sort-btn" data-up="'+i+'"'+(i===0?' disabled':'')+'>▲</button>'+
        '<button class="sort-btn" data-dn="'+i+'"'+(i===inventory.length-1?' disabled':'')+'>▼</button>'+
      '</div>';
    container.appendChild(div);
  });
  container.querySelectorAll('[data-up]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var idx=parseInt(this.dataset.up);
      moveItem(idx, idx-1);
    });
  });
  container.querySelectorAll('[data-dn]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var idx=parseInt(this.dataset.dn);
      moveItem(idx, idx+1);
    });
  });
}

function renderDelList(){
  var container=document.getElementById('delList');
  container.innerHTML='';
  inventory.forEach(function(item){
    var div=document.createElement('div');
    div.className='del-list-item';
    var sl=stockOf(item.remain,item.total);
    div.innerHTML='<input type="checkbox" id="chk-'+item.id+'">'+
      '<label for="chk-'+item.id+'" style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer">'+
      '<span class="del-item-name">'+item.name+'</span>'+
      
      '<span class="del-count-badge" style="background:'+sl.bg+';color:'+sl.color+'">'+item.remain.toLocaleString()+'개</span>'+
      '</label>';
    div.querySelector('input').addEventListener('change',function(){div.classList.toggle('selected',this.checked);});
    div.addEventListener('click',function(e){
      if(e.target.tagName==='INPUT') return;
      var chk=div.querySelector('input');chk.checked=!chk.checked;div.classList.toggle('selected',chk.checked);
    });
    container.appendChild(div);
  });
}

// 컬러 피커 이벤트는 한 번만 바인딩
var _pickersBound = {};
function bindPicker(tabId){
  if(_pickersBound[tabId]) return;
  var picker=document.getElementById('colorpicker-'+tabId);
  if(!picker) return;
  picker.addEventListener('input',function(){
    tabColors[tabId]=this.value;
    applyTabColors();
    updateSwatchActive(tabId);
    saveTabColors();
  });
  picker.addEventListener('change',function(){
    tabColors[tabId]=this.value;
    applyTabColors();
    updateSwatchActive(tabId);
    saveTabColors();
  });
  _pickersBound[tabId]=true;
}

function updateSwatchActive(tabId){
  var wrap=document.getElementById('swatches-'+tabId);
  if(!wrap) return;
  wrap.querySelectorAll('.swatch').forEach(function(el){
    el.classList.toggle('active', el.dataset.color===tabColors[tabId]);
  });
}

function buildSwatches(containerId, tabId){
  var wrap=document.getElementById(containerId);
  if(!wrap) return;
  wrap.innerHTML='';
  // 피커 초기값 동기화
  var picker=document.getElementById('colorpicker-'+tabId);
  if(picker && tabColors[tabId]) picker.value=tabColors[tabId];
  // 피커 이벤트 바인딩 (한 번만)
  bindPicker(tabId);
  SWATCH_COLORS.forEach(function(s){
    var el=document.createElement('div');
    if(s.color===''){
      el.className='swatch-clear';
      el.textContent='✕';
      el.title='컬러 없음';
    } else {
      el.className='swatch'+(tabColors[tabId]===s.color?' active':'');
      el.style.background=s.color;
      el.dataset.color=s.color;
      el.title=s.label;
    }
    el.addEventListener('click',function(){
      tabColors[tabId]=s.color;
      if(picker&&s.color) picker.value=s.color;
      applyTabColors();
      updateSwatchActive(tabId);
      saveTabColors();
    });
    wrap.appendChild(el);
  });
}

function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r:r,g:g,b:b};
}
function getLum(hex){
  var rgb=hexToRgb(hex);
  return 0.299*rgb.r+0.587*rgb.g+0.114*rgb.b;
}
function hexWithAlpha(hex, alpha){
  // hex → rgba
  var rgb=hexToRgb(hex);
  return 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+alpha+')';
}

function applyTabColors(){
  ['inv','queue'].forEach(function(id){
    var btn=document.getElementById('tab-'+id);
    var bg=document.getElementById('bg-'+id);
    var c=tabColors[id];
    if(!btn) return;
    if(c && c.length>=4){
      try {
        btn.style.background=c;
        var lum=getLum(c);
        btn.style.color=lum>140?'#1a1a18':'#ffffff';
        btn.style.borderColor=c;
        if(bg){
          bg.style.background=hexWithAlpha(c,0.12);
          bg.style.borderColor=hexWithAlpha(c,0.3);
        }
      } catch(e){ console.warn('color error:', c, e); }
    } else {
      btn.style.background='';
      btn.style.color='';
      btn.style.borderColor='';
      if(bg){
        bg.style.background='';
        bg.style.borderColor='transparent';
      }
    }
  });
}

function saveTabColors(){
  db.ref('tabColors').set(tabColors)
    .then(function(){ setSyncStatus('● 저장됨',true); })
    .catch(function(e){ setSyncStatus('저장 실패',false); console.error('tabColors 저장 실패:',e); });
}

function saveQueue(){
  lock(2000);
  db.ref('queue').set(queue)
    .then(function(){setSyncStatus('● 저장됨',true);})
    .catch(function(e){setSyncStatus('저장 실패',false);console.error(e);});
}
function saveTitle(){
  db.ref('title').set({
    eyebrow:document.getElementById('eyebrow-text').textContent,

  });

// ── Firebase 실시간 리스너
db.ref('tabColors').on('value',function(snap){
  var data=snap.val();
  if(data&&typeof data==='object'){
    tabColors=data;
    applyTabColors();
    // 관리자 모드면 스와치 active 상태도 업데이트
    if(adminMode){
      updateSwatchActive('inv');
      updateSwatchActive('queue');
      var pInv=document.getElementById('colorpicker-inv');
      var pQ=document.getElementById('colorpicker-queue');
      if(pInv&&tabColors.inv) pInv.value=tabColors.inv;
      if(pQ&&tabColors.queue) pQ.value=tabColors.queue;
    }
  }
});

db.ref('inventory').on('value',function(snap){
  var data=snap.val();
  if(data&&Array.isArray(data)&&data.length>0){
    inventory=data.map(function(i){return Object.assign({img:'',price:''},i);});
  } else if(!data){
    db.ref('inventory').set(inventory);
  }
  if(!isLocked()) renderInventory();
});

db.ref('queue').on('value',function(snap){
  var data=snap.val();
  if(data&&data.status){ queue=data; }
  else if(!data){ db.ref('queue').set(queue); }
  if(!isLocked()){ renderQueue();updateQueueTab(); }
});

db.ref('title').on('value',function(snap){
  var data=snap.val();
  if(data){
    if(data.eyebrow){ document.getElementById('eyebrow-text').textContent=data.eyebrow; document.getElementById('input-eyebrow').value=data.eyebrow; }
    if(data.main){ document.getElementById('title-text').textContent=data.main; document.getElementById('input-title').value=data.main; document.title=data.eyebrow+' — '+data.main; }
  }
});

db.ref('.info/connected').on('value',function(snap){
  var ok=snap.val()===true;
  setSyncStatus(ok?'● 실시간 연동 중':'○ 연결 끊김',ok);
  if(!ok) setTimeout(function(){try{db.goOnline();}catch(e){}},3000);
});

// ── 관리자 모드
var ADMIN_PW='fm5678!';

function enterAdminMode(){
  adminMode=true;
  document.getElementById('fabAdmin').classList.add('fab-admin-on');
  document.getElementById('title-edit').style.display='flex';
  document.getElementById('stab-add').classList.remove('hidden');
  document.getElementById('stab-sort').classList.remove('hidden');
  document.getElementById('stab-del').classList.remove('hidden');
  document.getElementById('tab-queue').style.display='';
  // Firebase에서 최신 tabColors 불러온 후 스와치 빌드
  db.ref('tabColors').once('value').then(function(snap){
    var data=snap.val();
    if(data&&typeof data==='object') tabColors=data;
    buildSwatches('swatches-inv','inv');
    buildSwatches('swatches-queue','queue');
    applyTabColors();
  });
  renderInventory();renderQueue();
}
function exitAdminMode(){
  adminMode=false;
  document.getElementById('fabAdmin').classList.remove('fab-admin-on');
  document.getElementById('title-edit').style.display='none';
  document.getElementById('stab-add').classList.add('hidden');
  document.getElementById('stab-sort').classList.add('hidden');
  document.getElementById('stab-del').classList.add('hidden');
  switchTab('inv');switchSubTab('list');
  renderInventory();renderQueue();updateQueueTab();
}

// ── 이벤트 바인딩
document.getElementById('fabAdmin').addEventListener('click',function(){
  if(adminMode){exitAdminMode();return;}
  document.getElementById('pwOverlay').classList.add('show');
  document.getElementById('pwInput').value='';
  document.getElementById('pwError').textContent='';
  setTimeout(function(){document.getElementById('pwInput').focus();},50);
});

function tryLogin(){
  if(document.getElementById('pwInput').value===ADMIN_PW){
    document.getElementById('pwOverlay').classList.remove('show');
    enterAdminMode();
  } else {
    document.getElementById('pwError').textContent='비밀번호가 맞지 않아요.';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}
document.getElementById('pwConfirm').addEventListener('click',tryLogin);
document.getElementById('pwInput').addEventListener('keydown',function(e){if(e.key==='Enter')tryLogin();});
document.getElementById('pwCancel').addEventListener('click',function(){document.getElementById('pwOverlay').classList.remove('show');});
document.getElementById('pwOverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
document.getElementById('pwToggle').addEventListener('click',function(){
  var inp=document.getElementById('pwInput');inp.type=inp.type==='password'?'text':'password';
});

document.getElementById('submitAddBtn').addEventListener('click',function(){
  var name=document.getElementById('new-name').value.trim();
  var total=parseInt(document.getElementById('new-total').value)||0;
  var remain=parseInt(document.getElementById('new-remain').value)||0;
  if(!name){alert('상품명을 입력해주세요.');document.getElementById('new-name').focus();return;}
  if(total<1){alert('재고 수량을 입력해주세요.');document.getElementById('new-total').focus();return;}
  var price=document.getElementById('new-price').value.trim();
  inventory.push({id:uid(),name:name,cat:'',price:price,total:total,remain:Math.min(Math.max(0,remain),total),img:''});
  ['new-name','new-price','new-total','new-remain'].forEach(function(id){document.getElementById(id).value='';});
  lockUntil=0;
  saveInventory();renderInventory();switchSubTab('list');
});

document.getElementById('confirmDelBtn').addEventListener('click',function(){
  var checked=[].slice.call(document.querySelectorAll('#delList input[type=checkbox]:checked'));
  if(checked.length===0){alert('삭제할 항목을 선택해주세요.');return;}
  if(!confirm(checked.length+'개 항목을 삭제할까요?')) return;
  var ids=checked.map(function(c){return c.id.replace('chk-','');});
  inventory=inventory.filter(function(x){return ids.indexOf(x.id)===-1;});
  lockUntil=0;
  saveInventory();renderInventory();switchSubTab('list');
});

document.getElementById('input-eyebrow').addEventListener('input',function(){
  document.getElementById('eyebrow-text').textContent=this.value;
  saveTitle();
});
document.getElementById('input-title').addEventListener('input',function(){

  saveTitle();
});

});
document.addEventListener('click',function(e){

    document.getElementById('imgModalImg').src=e.target.dataset.modalSrc;
    document.getElementById('imgModalName').textContent=e.target.dataset.modalName||'';
    document.getElementById('imgModalOverlay').classList.add('show');

});
